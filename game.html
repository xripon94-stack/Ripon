<!DOCTYPE html>
<html>
<head>
<title>Catch The Button</title>

<style>
body{
    margin:0;
    height:100vh;
    overflow:hidden;
    background:#667eea;
    font-family:Arial;
}

h1{
    color:white;
    text-align:center;
}

#score{
    color:white;
    text-align:center;
    font-size:25px;
}

#btn{
    position:absolute;
    padding:15px 25px;
    border:none;
    border-radius:10px;
    background:red;
    color:white;
    font-size:18px;
}
</style>
</head>
<body>

<h1>Catch The Button</h1>
<p id="score">Score: 0</p>

<button id="btn" onclick="moveBtn()">Catch Me!</button>

<script>
let score = 0;

function moveBtn(){
    score++;

    document.getElementById("score").innerText =
    "Score: " + score;

    let x = Math.random() * (window.innerWidth - 120);
    let y = Math.random() * (window.innerHeight - 120);

    let btn = document.getElementById("btn");
    btn.style.left = x + "px";
    btn.style.top = y + "px";
}
</script>

</body>
</html>
